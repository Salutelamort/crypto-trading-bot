# ============================================================
#  Конфигурация торгового бота
#  Архитектура из r/algotrading (комментарий piratastuertos):
#  - Инфраструктура: детерминированный Python
#  - Решения (рождение/смерть агентов): ЭВОЛЮЦИЯ, без LLM
# ============================================================

# --- Данные ---
exchange: binance          # публичный REST Binance, БЕЗ ключей (только spot data)
symbols:                   # символы-кандидаты для эволюции
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
timeframe: 4h              # ТАЙМФРЕЙМ ПО УМОЛЧАНИЮ (для одиночных операций/фолбэка)
# МУЛЬТИТАЙМФРЕЙМ: таймфрейм — часть генома, эволюция подбирает лучший под стратегию,
# а форвард в облаке гоняет их параллельно (диверсификация: быстрые и медленные
# стратегии слабо коррелируют). Включены только ТФ, где за 3 года достаточно баров
# для обучения и валидации. "Месяц"/"год" исключены намеренно: 3–36 свечей —
# статистически пусто (нельзя ни обучить, ни проверить); долгосрок закрыт макро-фильтром.
timeframes:
  - 1h                     # ~26280 баров
  - 2h                     # ~13140
  - 4h                     # ~6570
  - 6h                     # ~4380
  - 8h                     # ~3285
  - 12h                    # ~2190
  - 1d                     # ~1095
history_days: 1095         # 3 года: захватываем РАЗНЫЕ режимы (бычий/боковой/медвежий),
                           # иначе агенты переобучаются под один обвал и "победитель" случаен

# --- Валидация: WALK-FORWARD (защита от переобучения, совет из треда) ---
# Стратегия должна быть прибыльной не в одном удачном окне, а в НЕСКОЛЬКИХ
# последовательных out-of-sample окнах подряд. Это убивает подгонку под кривую.
train_ratio: 0.50          # первая половина данных — in-sample (фитнес отбора)
test_ratio: 0.50           # вторая половина — out-of-sample, делится на окна ниже
validation:
  walk_forward_windows: 4  # на сколько окон режем out-of-sample (устойчивость во времени)
  embargo_bars: 20         # ЗАЗОР между train и test (López de Prado, purged CV):
                           # индикаторы на границе не подсматривают данные обучения

# --- Эволюция (генерация/отбор/убийство агентов) ---
evolution:
  population_size: 60       # сколько агентов живо одновременно (~20 у автора)
  generations: 12           # поколений за один запуск (чем больше — тем шире поиск)
  survivors: 12             # сколько лучших выживает в поколении
  max_survivors_per_symbol: 5  # КВОТА на символ: пул не схлопывается в одну монету
                               # (диверсификация генофонда; Том Бассо)
  mutations_per_survivor: 3 # мутаций от каждого выжившего
  anti_clone_corr: 0.85     # КОРРЕЛЯЦИЯ кривых дохода > этого → убить более слабого клона
  min_trades: 15            # стратегии с меньшим числом сделок не считаем (статзначимость)
  restrict_to_proven: false # было true — funnel'ило всю генерацию в одну "доказанную"
                            # монету и убивало разнообразие. Для диверсифицированного
                            # портфеля исследуем ВСЕ символы.
  proven_min_sharpe: 0.0    # символ "доказан", если есть агент с OOS Sharpe выше этого

# --- Риск-менеджмент (САМОЕ ВАЖНОЕ — это всё) ---
# КОНСЕРВАТИВНЫЙ ПРОФИЛЬ: минимальный риск + стабильность важнее доходности.
risk:
  allow_short: true         # ТРИ состояния: long / short / кэш. На падающем рынке
                            # система зарабатывает шортом, а не обречена на ноль.
                            # (демо/фьючерс-логика; для чистого spot поставить false)
  position_fraction: 0.10   # ПОТОЛОК доли капитала на сделку (не больше этого)
  # ВОЛАТИЛЬНОСТЬ-ТАРГЕТИНГ (risk parity): размер позиции от риска до стопа, чтобы
  # каждая сделка рисковала одинаковой долей капитала. Спокойная монета → больше,
  # дёрганая → меньше → глаже кривая, ниже просадки (профиль "минимальный риск").
  vol_target: true          # включить размер от волатильности (иначе фикс. position_fraction)
  risk_per_trade: 0.005     # целевой риск на сделку = 0.5% капитала (до стопа)
  # --- Стоп от ВОЛАТИЛЬНОСТИ (ATR), а не фиксированный % ---
  # Фиксированные 1.5% на 1h-барах крипты выбивало позиции рыночным шумом (winrate ~24%).
  # ATR-стоп подстраивается: спокойная монета → узкий стоп, дёрганая → шире.
  atr_stop: true            # true = считать стоп/тейк/трейл от ATR; false = от процентов ниже
  atr_period: 14            # период ATR (средний размах свечи)
  atr_stop_mult: 2.0        # жёсткий стоп = 2.0 × ATR от входа (риск-единица "R")
  atr_trail_mult: 2.5       # trailing-стоп = 2.5 × ATR от пика/дна (ratcheting)
  atr_take_mult: 6.0        # тейк = 6.0 × ATR = R:R 3:1 (чат: "R:R минимум 1:3")
  # Резерв (используются, если atr_stop: false):
  stop_loss_pct: 0.025      # жёсткий стоп-лосс 2.5%
  trailing_stop_pct: 0.015  # ratcheting trailing stop
  take_profit_pct: 0.05     # фиксация прибыли 5%
  max_open_positions: 2     # меньше одновременных позиций = меньше связанного риска
  max_positions_per_symbol: 1  # НЕ дублировать одну монету (антиконцентрация:
                               # раньше 2 агента вставали в один шорт по SOL разом)
  max_portfolio_drawdown: 0.04  # стоп-кран: просадка портфеля >4% → новые входы стоп

# --- Издержки (бумага их игнорирует — мы НЕТ) ---
costs:
  fee_pct: 0.001            # комиссия 0.1% за сделку (Binance spot taker)
  slippage_pct: 0.0005      # проскальзывание 0.05%

# --- Исполнение: мы НЕ конкурируем в скорости с гигантами ---
# Стратегия не должна зависеть от мгновенного доступа к бирже. Поэтому вход/выход
# по сигналу происходит с задержкой: реагируем на УЖЕ ЗАКРЫТЫЙ бар, а не на текущий.
# Если стратегия работает только при мгновенном исполнении — она отсеется при отборе.
execution:
  signal_delay_bars: 1      # задержка реакции на сигнал (в барах). 0 = мгновенно (НЕ рекомендуется)
  # Таймфрейм держим 1h и выше (timeframe сверху) — никакого скальпинга/HFT,
  # где решает скорость. Наше преимущество — логика, а не миллисекунды.

# --- Пороги ОТБОРА (решает эволюция, без LLM) ---
# Это "ворота допуска" к живой торговле и правила смерти агентов.
supervisor:
  # Продвигать в paper-live, если выполнены условия качества И (Sharpe ИЛИ alpha).
  # Прежний порог Sharpe>=1.2 был НЕДОСТИЖИМ (лучший за 16k агентов был -0.46) —
  # система никогда никого не продвигала и стояла в вечном нуле. Теперь порог
  # реалистичный + альтернативный вход через alpha (обгон рынка).
  promote_min_sharpe: 0.5          # достижимый порог качества кривой
  promote_min_alpha: 0.05          # ИЛИ обгон "купи и держи" на >=5% за OOS-окна
  promote_min_calmar: 0.5          # ИЛИ Calmar >=0.5 (доход на единицу макс. просадки)
  deflated_sharpe_enabled: true    # поправка на число испытаний (López de Prado):
                                   # планка sharpe-пути = max(promote_min_sharpe, SR0),
                                   # где SR0 — лучший Sharpe, достижимый по чистой удаче
  promote_min_trades: 20           # минимум сделок (статзначимость)
  promote_min_consistency: 0.6     # доля окон, где обогнали рынок (alpha>0), >= 60%
  promote_max_drawdown: 0.12       # просадка не выше 12% (профиль низкого риска)
  # Диверсификация допуска (Том Бассо: портфель должен пережить любой режим):
  promote_max_per_symbol: 2        # не больше 2 стратегий на одну монету
  promote_max_total: 6             # не больше 6 живых стратегий разом
  # Убивать агента если:
  kill_max_drawdown: 0.15          # просадка > 15% — режем риск рано
  kill_min_consistency: 0.5        # окон с обгоном рынка < 50% (неустойчив)

# --- Макро-фильтр: потоки в крипто-ETF (farside.co.uk) ---
# Страж risk-on/risk-off. НЕ генерирует сделки — только блокирует НОВЫЕ входы
# при сильном оттоке денег из спотовых BTC/ETF. Выходы из позиций не трогает.
macro:
  enabled: true
  asset: BTC                # BTC или ETH — широкий прокси настроения крипторынка
  lookback_days: 5          # суммируем потоки за N последних дней
  block_threshold_musd: 150 # блокировать новые входы, если отток сильнее этого (млн $)

# --- Новостной фон (страж входов, не генератор сделок; бесплатно, без ключей) ---
news:
  enabled: true
  min_negative_headlines: 3  # столько СИЛЬНЫХ негативных заголовков (взлом/крах) → блок входов
  block_above_greed: 80      # индекс жадности >= этого (перегрев) → блок новых входов

# --- Защиты (protections, паттерн Freqtrade): предохранители поверх риска ---
# Паузят входы при плохой полосе. Скользящее окно — снимаются автоматически.
protections:
  stoploss_guard:
    enabled: true
    window_hours: 24        # окно наблюдения за убытками
    max_losses: 4           # столько убыточных закрытий за окно → ПАУЗА всех входов
  symbol_lock:
    enabled: true
    window_hours: 72        # окно по каждому символу
    max_loss_frac: 0.03     # суммарный убыток по символу > 3% капитала → блок символа

# --- Бумажная торговля ---
paper:
  starting_capital: 10000   # стартовый виртуальный капитал, USDT

# --- Живой пейпер (реальное время, без биржи и ключей) ---
live:
  interval_seconds: 300     # как часто проверять рынок (300с = 5 мин)
  allow_unpromoted: true    # если никто не продвинут — торговать лучшими кандидатами в ДЕМО
  demo_agents: 2            # сколько демо-агентов брать, если нет продвинутых

# --- База данных ---
db_path: data/bot.db        # SQLite — для всего (как у автора)
