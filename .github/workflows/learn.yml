name: daily-learn

# Автообучение бота в облаке GitHub — БЕЗ твоего компа.
on:
  schedule:
    - cron: "*/15 * * * *"   # каждые 15 минут (репо публичный → минуты бесплатны)
  workflow_dispatch: {}        # + кнопка ручного запуска во вкладке Actions

permissions:
  contents: write              # чтобы бот мог сохранять обучение обратно в репозиторий

# Чтобы параллельные запуски не конфликтовали при push
concurrency:
  group: daily-learn
  cancel-in-progress: false

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: День обучения
        run: python daily_learn.py

      - name: Сохранить обучение обратно в репозиторий
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/bot.db TRACK_RECORD.csv
          git commit -m "auto-learn $(date -u +%F)" || echo "нет изменений"
          git pull --rebase --autostash || true
          git push
